<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArrowFunction</title>
</head>
<body>
    <script>
        const num=(i)=>{
            return i*i;
        }
        console.log(num(5));

        function greet(a){
            console.log("welcome "+a);
        }
        function bye(b){
            console.log("bye "+b);
        }
        function callback(x,y){
          x("purush");
          y("purush");
        }
        callback(greet,bye);



    </script>
</body>
</html>
