<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArrowFunction</title>
</head>
<body>
    <script>
        const num=(i)=>{
            return i*i;
        }
        console.log(num(5));

        function greet(a,b){
            console.log(a+b);
        }
        function callback(x){
           x(10,20);
        }
        callback(greet);



    </script>
</body>
</html>
