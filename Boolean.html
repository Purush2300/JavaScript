<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boolean</title>
</head>
<body>
    <p>Rock Paper Scissor game</p>
   <button onclick="
 playGame('rock');
   ">rock</button>
   <button
   onclick="
   playGame('paper');
 
   ">paper</button>
    <button
    onclick="
   playGame('scissor');

   "
    >scissor</button>
    <p class="js-predict"></p>
    <p class="js-moves"></p>
    <p class="js-score"></p>
    <button onclick="
    score.win=0;
    score.loss=0;
    score.tie=0;
    localStorage.removeItem('score');
    updateScore();
    
    ">reset scores</button>
    <script>
        const score=JSON.parse(localStorage.getItem("score"))||{
             win:0,
            loss:0,
            tie:0
        };
   
    updateScore();
    
        function playGame(player1){
            let computerguess=computerGuess();
             let res='';
          if(player1 === 'scissor'){
                    if(computerguess=='rock'){
                        res='you lose';
                       }else if(computerguess=='paper'){
                        res='you won';
                        } else if(computerguess=='scissor'){
                        res='tie';
                        }
          } else if(player1 === 'paper'){
                        if(computerguess=='rock'){
                            res='you won';
                        }else if(computerguess=='paper'){
                            res='tie';
                        } else if(computerguess=='scissor'){
                            res='you lose';
                        }
          }else if(player1 === 'rock'){
                        if(computerguess=='rock'){
                            res='tie';
                        }else if(computerguess=='paper'){
                            res='you lose';
                        } else if(computerguess=='scissor'){
                            res='you won';
                        }
          }

          if(res==='you won'){
            score.win+=1;
          } else if(res === 'you lose'){
            score.loss+=1;
          }else if(res ==='tie'){
            score.tie+=1;
          }
          localStorage.setItem("score",JSON.stringify(score));
document.querySelector('.js-predict').innerHTML=res;
document.querySelector('.js-moves').innerHTML=`you ${player1} computer ${computerguess}`;
updateScore();
   
//                 alert(`you picked ${player1} computer guess ${computerguess} , ${res}
// win:${score.win}, loss: ${score.loss},tie: ${score.tie}`);
        }



        function updateScore(){
            document.querySelector(".js-score").innerHTML=`win:${score.win}, loss: ${score.loss},tie: ${score.tie}`;
        }
        
        function computerGuess(){
                    let randomguess=Math.random();
                    let computerguess='';
                    if(randomguess>=0 && randomguess<=1/3){
                        computerguess='rock';

                    }else if(randomguess>=1/3 && randomguess<=2/3){
                        computerguess='paper';
                    }else if(randomguess>=2/3 && randomguess<=1){
                        computerguess='scissor';
                    }
                    return computerguess;
        }

    </script>
    
</body>
</html>
