<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrays-Js</title>
</head>
<body>
    <p >Todo List</p>
    <!-- <button onclick="Increment()" >increment</button>
    <button onclick="Decrement()">decrement</button> -->
    <input type="text" class="js-input" onkeydown="Press(event)">
    <button onclick="addItem()" >add</button>
    <div class="js-todo">
    </div>
    <script>
        // const arr =[1,2,3,4,5];
        // console.log([]);
        // console.log(arr[0]=10);
        // console.log(arr)
        // let a=0;
        // function Increment(){
        //     a++;
        //     console.log(a);
        // document.querySelector(".scoredisplay").innerHTML=a;
        // }
        // function Decrement(){
        //     a--;
        // document.querySelector(".scoredisplay").innerHTML=a;
        // }
        const arr=[];
        function Press(event){
            if(event.key ==='Enter'){
                addItem();
            }
        }
        function play(){
            let todoValue="";
        for(let i=0;i<arr.length;i++){
            
            let value=`<p>${arr[i]}</p>`;
            todoValue+=value;
        }
        document.querySelector(".js-todo").innerHTML=todoValue;
        console.log(todoValue);
        }
        function addItem(){
            const inputNumber=document.querySelector(".js-input");
            const inputValue=inputNumber.value;
            arr.push(inputValue);
            inputNumber.value="";
            play();
        }

    </script>
</body>
</html>
