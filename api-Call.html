<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Api_Calls</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<style>
   #product{
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
   }
   .card{
    width: 200;
    border: 2px solid black;
    padding: 20px;
   }
</style>

<body>
<div id="product"></div>

    <script>
       async function getMovies() {

 const response = await fetch("https://dummyjson.com/products?limit=194");
const data = await response.json();

for(let i=0;i<data.products.length;i++){
    const product=document.getElementById("product");
    let reviewsHTML = "";

for(let j = 0; j < data.products[i].reviews.length; j++){

    reviewsHTML += `
        <p>⭐ ${data.products[i].reviews[j].rating}</p>
       
    `;

}
   product.innerHTML += `
  <div class="card">

    <img src="${data.products[i].images[0]}" width="150">

    <h3>${data.products[i].title}</h3>

    <h4>Price : ${data.products[i].price}</h4>

    <h4>Rating : ${data.products[i].rating}</h4>

    ${reviewsHTML}

</div>
`;
}


                   
    
}

getMovies();


    </script>
</body>
</html>
